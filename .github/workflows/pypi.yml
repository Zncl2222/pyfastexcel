# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

# Release procedure:
#   1. Bump `version` in pyproject.toml (the published version comes from
#      there, NOT from the tag name) and merge it.
#   2. Push the matching tag (e.g. v0.2.0rc0) -> publishes to Test PyPI and
#      runs the install smoke tests.
#   3. Once step 2 is green, create the GitHub Release *from the existing tag*
#      -> publishes to PyPI.
#
# Do not create the tag from the Release UI: GitHub then fires `push` (tag) and
# `release` at the same time, so Test PyPI and PyPI would publish in parallel
# and step 2 would no longer gate step 3.

on:
  push:
    tags:
      - '*'
  release:
    types: [published]

jobs:
  build-shared-library:
    strategy:
      matrix:
        include:
          # ubuntu-22.04 runner + debian:bullseye Docker (Debian 11, GLIBC 2.31)
          # to maintain the same GLIBC compatibility as the old ubuntu-20.04 build.
          # Go 1.25.x has no official bullseye image, so we install the Go
          # toolchain from the official tarball on top of debian:bullseye.
          - runs-on: ubuntu-22.04
            plat-name: manylinux2014_x86_64
          - runs-on: windows-latest
            plat-name: win-amd64
          - runs-on: macos-14
            plat-name: macosx_11_0_arm64
    runs-on: ${{ matrix.runs-on }}
    if: startsWith(github.ref, 'refs/tags/') || github.event_name != 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Golang
        if: runner.os != 'Linux'
        uses: actions/setup-go@v5
        with:
          go-version: 1.25
          check-latest: true
      - name: Build shared library (Linux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            debian:bullseye \
            bash -c "set -e && \
              apt-get update -q && apt-get install -y gcc make curl git -q && \
              curl -sSL -o /tmp/go.tar.gz https://go.dev/dl/go1.25.12.linux-amd64.tar.gz && \
              echo '234828b7a89e0e303d2556310ee549fbcf253d28de937bac3da13d6294262ac1  /tmp/go.tar.gz' | sha256sum -c - && \
              tar -C /usr/local -xzf /tmp/go.tar.gz && \
              export PATH=\$PATH:/usr/local/go/bin && \
              git config --global --add safe.directory /workspace && \
              CGO_ENABLED=1 make"
      - name: Build shared library
        if: runner.os != 'Linux'
        run: |
          go env -w CGO_ENABLED="1"
          make
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag '$TAG' does not match pyproject.toml version '$PKG'"
            exit 1
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build setuptools wheel
      - name: Build the wheel
        run: python -m build --wheel --outdir dist --config-setting=--build-option=--plat-name=${{ matrix.plat-name }}

      - uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.runs-on }}
          path: dist/*.whl

  test-release:
    runs-on: ubuntu-latest
    needs: [build-shared-library]
    permissions:
      id-token: write
    if: startsWith(github.ref, 'refs/tags/') && github.event_name != 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Publish distribution to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          repository-url: https://test.pypi.org/legacy/
          # Re-pushing a tag after a partial failure should not 400 on the
          # files that already made it to Test PyPI.
          skip-existing: true

  test-download-and-run:
    needs: test-release
    name: Test Package Installation on Multiple OS
    if: startsWith(github.ref, 'refs/tags/') && github.event_name != 'release'
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        runs-on: [ubuntu-latest, ubuntu-22.04, windows-latest, macos-14]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        include:
          - python-version: '3.14'
            runs-on: ubuntu-latest
            experimental: true

    steps:
      - name: Checkout code (optional, for tests, but package will be pip-installed)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.experimental == true }}

      - name: Remove local package from PYTHONPATH on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          rm -rf ./pyfastexcel

      - name: Remove local package from PYTHONPATH on Windows
        if: runner.os == 'Windows'
        run: Remove-Item -Recurse -Force .\pyfastexcel
        shell: pwsh

      - name: Install published package from PyPI
        run: |
          python -m pip install --upgrade pip
          pip install eval-type-backport
          pip install -i https://test.pypi.org/simple/ pyfastexcel --pre --extra-index-url https://pypi.org/simple/

      - name: Run tests
        run: |
          python examples/full_examples.py

  release-job:
    runs-on: ubuntu-latest
    needs: [build-shared-library]
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/
      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
