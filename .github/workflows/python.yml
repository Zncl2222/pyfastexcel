name: Python Unit Test

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-shared-library:
    strategy:
      matrix:
        include:
          # ubuntu-22.04 runner + golang:1.24-bullseye Docker (Debian 11, GLIBC 2.31)
          # to maintain the same GLIBC compatibility as the old ubuntu-20.04 build
          - runs-on: ubuntu-22.04
            filename: pyfastexcel.so
          - runs-on: windows-latest
            filename: pyfastexcel.dll
          - runs-on: macos-14
            filename: pyfastexcel.dylib
    runs-on: ${{ matrix.runs-on }}
    steps:
        - uses: actions/checkout@v4
        - name: Set up Golang
          if: runner.os != 'Linux'
          uses: actions/setup-go@v5
          with:
            go-version: '1.24'
            check-latest: true
        - name: Build shared library (Linux)
          if: runner.os == 'Linux'
          run: |
            docker run --rm \
              -v ${{ github.workspace }}:/workspace \
              -w /workspace \
              golang:1.24-bullseye \
              bash -c "git config --global --add safe.directory /workspace && apt-get update -q && apt-get install -y gcc make -q && CGO_ENABLED=1 make"
        - name: Build shared library
          if: runner.os != 'Linux'
          run: |
            go env -w CGO_ENABLED="1"
            make
        - uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.runs-on }}-shared-library
            path: ./pyfastexcel/${{ matrix.filename }}

  python-test-ubuntu:
    name: py-unittest-ubuntu
    needs: [build-shared-library]
    strategy:
      max-parallel: 5
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - python-version: "3.14"
            experimental: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: |
          mv ./pyfastexcel.so ./pyfastexcel
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.experimental == true }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests to generate coverage statistics
        run: uv run pytest --cov --cov-report=term --cov-report xml:py_coverage.xml

      - name: Upload coverage to Codacy
        if: github.event_name == 'push'
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: bash <(curl -Ls https://coverage.codacy.com/get.sh) report -r py_coverage.xml

      - name: Upload coverage reports to Codecov
        if: github.event_name == 'push' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
            token: ${{ secrets.CODECOV_TOKEN }}
            slug: Zncl2222/pyfastexcel
            file: py_coverage.xml

  python-test-windows:
    name: py-unittest-windows
    needs: [build-shared-library]
    strategy:
      max-parallel: 5
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - python-version: "3.14"
            experimental: true
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: |
          mv ./pyfastexcel.dll ./pyfastexcel
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.experimental == true }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest --cov --cov-report=term --cov-report xml:py_coverage.xml

  python-test-macos:
    name: py-unittest-macos
    needs: [build-shared-library]
    strategy:
      max-parallel: 5
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - python-version: "3.14"
            experimental: true
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: |
          mv ./pyfastexcel.dylib ./pyfastexcel
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.experimental == true }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest --cov --cov-report=term --cov-report xml:py_coverage.xml
